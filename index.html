<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Drive Write Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', monospace;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 36px;
      max-width: 520px;
      width: 100%;
    }

    h1 {
      font-size: 1rem;
      font-weight: normal;
      color: #7c85ff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.78rem;
      color: #556;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.72rem;
      color: #778;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #e2e8f0;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      padding: 10px 12px;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, textarea:focus {
      border-color: #7c85ff;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      width: 100%;
      padding: 11px;
      background: #7c85ff;
      color: #0f1117;
      border: none;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 0.88rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button:hover:not(:disabled) { background: #9aa0ff; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .log {
      margin-top: 24px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 14px;
      font-size: 0.78rem;
      line-height: 1.7;
      min-height: 60px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .ok   { color: #4ade80; }
    .err  { color: #f87171; }
    .info { color: #94a3b8; }

    .divider {
      border: none;
      border-top: 1px solid #2d3148;
      margin: 24px 0;
    }

    a { color: #7c85ff; text-decoration: none; font-size: 0.75rem; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <h1>Drive Write Test</h1>
  <p class="subtitle">Checks if your OAuth token can create a file in Google Drive</p>

  <label>Access Token</label>
  <input id="token" type="password" placeholder="paste your OAuth access token here" />

  <label>Test file name</label>
  <input id="filename" type="text" value="drive_write_test.txt" />

  <label>File content</label>
  <textarea id="content">Hello from Drive Write Test — written at {timestamp}</textarea>

  <button id="btn" onclick="runTest()">Run Write Test</button>

  <div class="log" id="log"><span class="info">Waiting to run…</span></div>

  <hr class="divider" />
  <a href="https://developers.google.com/oauthplayground/" target="_blank">
    → Get a token from OAuth Playground
  </a>
  &nbsp;·&nbsp;
  <a href="https://developers.google.com/drive/api/guides/manage-uploads" target="_blank">
    → Drive upload docs
  </a>
</div>

<script>
function log(msg, cls = 'info') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('log').innerHTML = '';
}

async function runTest() {
  clearLog();
  const token    = document.getElementById('token').value.trim();
  const filename = document.getElementById('filename').value.trim() || 'drive_write_test.txt';
  const rawContent = document.getElementById('content').value
    .replace('{timestamp}', new Date().toISOString());
  const btn = document.getElementById('btn');

  if (!token) { log('✗ Paste an access token first.', 'err'); return; }

  btn.disabled = true;

  // Create file via multipart upload
  log('→ Creating file in Drive…');
  const metadata = JSON.stringify({ name: filename, mimeType: 'text/plain' });
  const body     = new Blob([rawContent], { type: 'text/plain' });

  const form = new FormData();
  form.append('metadata', new Blob([metadata], { type: 'application/json' }));
  form.append('file', body);

  try {
    const res = await fetch(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink',
      {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: form
      }
    );
    const rj = await res.json();
    if (!res.ok) {
      log(`✗ Upload failed (${res.status}): ${JSON.stringify(rj?.error?.message || rj)}`, 'err');
    } else {
      log(`✓ File created!`, 'ok');
      log(`  Name : ${rj.name}`, 'ok');
      log(`  ID   : ${rj.id}`, 'ok');
      if (rj.webViewLink) log(`  Link : ${rj.webViewLink}`, 'ok');
    }
  } catch (e) {
    log(`✗ Upload request failed: ${e.message}`, 'err');
  }

  btn.disabled = false;
}
</script>
</body>
</html>
